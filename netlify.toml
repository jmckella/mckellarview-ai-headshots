[build]
  publish = "."
  functions = "netlify/functions"

# Legacy Netlify subdomain → custom domain
[[redirects]]
  from = "https://mckellarview-ai-headshots.netlify.app/*"
  to = "https://headshots.motionvisualmedia.com/:splat"
  status = 301
  force = true

# Pretty paths for the fulfillment interfaces + Stripe success page
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/delivery"
  to = "/delivery.html"
  status = 200

[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
